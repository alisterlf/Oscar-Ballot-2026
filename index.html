<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <title>Oscars 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/handlebars@latest/dist/handlebars.js"></script>
    <script src="main.js" defer></script>
  </head>
  <body>
    <h1>Oscars 2026 ballot</h1>
    <div id="predictionsList"></div>
    <button onclick="sharePredictions()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" xmlns="http://www.w3.org/2000/svg"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg> Share predictions</button>
    <button onclick="clearPredictions()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" xmlns="http://www.w3.org/2000/svg"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg> Clear predictions</button>
    <p>Watched: <span id="watchedPercentage"></span></p>
    <template>
      {{#each this}}
      <section class="award">
        <h2>{{name}}</h2>
        <label class="winner-select">
          Winner:
          <select data-category="{{generateIdFromCategoryTitle name}}">
            <option value="">-- Select winner --</option>
            {{#each nominees}}
            <option value="{{getImdbId url}}">{{name}}</option>
            {{/each}}
          </select>
        </label>
        <p>Watched in this category: <span class="watchedPercentage"></span></p>
        <section class="nominees">
          {{#each nominees}}
          <figure>
            <img src="{{poster}}" />
            <figcaption>
              <h3>
                <a href="{{url}}">{{name}}</a>
              </h3>
              <input
                type="radio"
                class="sr-only"
                name="{{generateIdFromCategoryTitle ../name}}"
                id="{{generateIdFromCategoryTitle ../name}}-{{getImdbId url}}-prediction"
                value="{{getImdbId url}}"
              />
              <label class="icon-btn prediction" for="{{generateIdFromCategoryTitle ../name}}-{{getImdbId url}}-prediction">
                <svg class="icon-off" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg"><polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26"/></svg>
                <svg class="icon-on" width="14" height="14" viewBox="0 0 24 24" fill="currentColor" stroke="none" xmlns="http://www.w3.org/2000/svg"><polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26"/></svg>
                Prediction
              </label>
              <input
                type="checkbox"
                class="sr-only"
                data-movie-id="{{id}}"
                name="{{generateIdFromCategoryTitle ../name}}"
                id="{{generateIdFromCategoryTitle ../name}}-{{getImdbId url}}-watched"
              />
              <label class="icon-btn watched" for="{{generateIdFromCategoryTitle ../name}}-{{getImdbId url}}-watched">
                <svg class="icon-off" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" xmlns="http://www.w3.org/2000/svg"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                <svg class="icon-on" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" xmlns="http://www.w3.org/2000/svg"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                Watched
              </label>
              <br />
              {{#each details}}
              <a href="{{url}}">{{name}}</a>
              {{/each}}
            </figcaption>
          </figure>
          {{/each}}
        </section>
      </section>
      {{/each}}
    </template>
  </body>
</html>
