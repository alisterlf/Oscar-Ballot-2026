<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <title>Oscars 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/handlebars@latest/dist/handlebars.js"></script>
    <script src="main.js" defer></script>
  </head>
  <body>
    <h1>Oscars 2026 ballot</h1>
    <div id="predictionsList"></div>
    <button onclick="sharePredictions()"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg> Share predictions</button>
    <p>Watched: <span id="watchedPercentage"></span></p>
    <template>
      {{#each this}}
      <section class="award">
        <h2>{{name}}</h2>
        <label class="winner-select">
          Winner:
          <select data-category="{{generateIdFromCategoryTitle name}}">
            <option value="">-- Select winner --</option>
            {{#each nominees}}
            <option value="{{getImdbId url}}">{{name}}</option>
            {{/each}}
          </select>
        </label>
        <p>Watched in this category: <span class="watchedPercentage"></span></p>
        <section class="nominees">
          {{#each nominees}}
          <figure>
            <img src="{{poster}}" />
            <figcaption>
              <h3>
                <a href="{{url}}">{{name}}</a>
              </h3>
              <label>
                <input
                  type="radio"
                  name="{{generateIdFromCategoryTitle ../name}}"
                  id="{{generateIdFromCategoryTitle ../name}}-{{getImdbId url}}-prediction"
                  value="{{getImdbId url}}"
                />
                Prediction
              </label>
              <label>
                <input
                  type="checkbox"
                  data-movie-id="{{id}}"
                  name="{{generateIdFromCategoryTitle ../name}}"
                  id="{{generateIdFromCategoryTitle ../name}}-{{getImdbId url}}-watched"
                />
                Watched
              </label>
              {{#each details}}
              <a href="{{url}}">{{name}}</a>
              {{/each}}
            </figcaption>
          </figure>
          {{/each}}
        </section>
      </section>
      {{/each}}
    </template>
  </body>
</html>
